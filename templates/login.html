{% extends 'base.html' %}
{% block auth %}
<div style="min-height:100vh;background:linear-gradient(135deg,#1a237e,#3949ab);display:flex;align-items:center;justify-content:center;">
  <div class="card p-4" style="width:360px;">
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill text-primary" style="font-size:3rem;"></i>
      <h4 class="fw-bold mt-2">Student Management</h4>
      <p class="text-muted small">Admin Login</p>
    </div>
    {% if error %}<div class="alert alert-danger small">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary w-100">Login <i class="bi bi-arrow-right"></i></button>
    </form>
    <p class="text-center text-muted small mt-3">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}
