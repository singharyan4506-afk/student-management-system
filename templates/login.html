{% extends 'base.html' %}
{% block auth %}
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="border:1px solid #000;padding:32px;width:320px;">
    <h2 style="margin-bottom:4px;">Student Management</h2>
    <p style="margin-bottom:20px;font-size:13px;">Admin Login</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="password" required>
      </div>
      <button class="btn btn-dark" style="width:100%;margin-top:8px;">Login</button>
    </form>
    <p style="margin-top:12px;font-size:12px;color:#555;">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}
