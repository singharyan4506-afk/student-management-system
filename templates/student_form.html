{% extends 'base.html' %}
{% block page_title %}{{ action }} Student{% endblock %}
{% block content %}
<div class="card p-4" style="max-width:600px;">
  <h6 class="fw-bold mb-4"><i class="bi bi-person-fill text-primary"></i> {{ action }} Student</h6>
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name *</label>
        <input type="text" name="name" class="form-control" value="{{ student.name if student else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Roll Number *</label>
        <input type="text" name="roll_no" class="form-control" value="{{ student.roll_no if student else '' }}" required>
      </div>
      <div class="col-md-6">
        <label class="form-label">Course *</label>
        <select name="course" class="form-select" required>
          {% for c in ['B.Tech','B.Sc','BCA','MBA','MCA','M.Tech','B.Com','BA','MA','Other'] %}
          <option value="{{ c }}" {{ 'selected' if student and student.course==c }}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Year *</label>
        <select name="year" class="form-select" required>
          {% for y in [1,2,3,4] %}
          <option value="{{ y }}" {{ 'selected' if student and student.year==y }}>Year {{ y }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ student.email if student else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ student.phone if student else '' }}">
      </div>
      <div class="col-12 mt-3 d-flex gap-2">
        <button class="btn btn-primary"><i class="bi bi-save-fill"></i> {{ action }} Student</button>
        <a href="{{ url_for('students') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
