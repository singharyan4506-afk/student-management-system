{% extends 'base.html' %}
{% block page_title %}{{ action }} Student{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" value="{{ student.name if student else '' }}" required>
      </div>
      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" name="roll_no" value="{{ student.roll_no if student else '' }}" required>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Course *</label>
        <select name="course" required>
          {% for c in ['B.Tech','B.Sc','BCA','MBA','MCA','M.Tech','B.Com','BA','MA','Other'] %}
          <option value="{{ c }}" {{ 'selected' if student and student.course==c }}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Year *</label>
        <select name="year" required>
          {% for y in [1,2,3,4] %}
          <option value="{{ y }}" {{ 'selected' if student and student.year==y }}>Year {{ y }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ student.email if student else '' }}">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ student.phone if student else '' }}">
      </div>
    </div>
    <div class="gap mt">
      <button class="btn btn-dark">{{ action }} Student</button>
      <a href="{{ url_for('students') }}" class="btn">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
